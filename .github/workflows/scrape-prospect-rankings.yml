name: Scrape Prospect Rankings

on:
  schedule:
    # Daily at 07:00 UTC (1:00 AM CT) — offset 1h from draft-order at 06:00
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scraper-prospect-rankings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: scrapers
        run: bun install

      - name: Install Playwright browsers
        working-directory: scrapers
        run: bunx playwright install chromium --with-deps

      - name: Scrape Tankathon
        working-directory: scrapers
        continue-on-error: true
        run: |
          bun run src/cli.ts rankings \
            --source tankathon \
            --year 2026 \
            --output ../back-end/data/rankings/tankathon_2026.json

      - name: Scrape WalterFootball
        working-directory: scrapers
        continue-on-error: true
        run: |
          bun run src/cli.ts rankings \
            --source walterfootball \
            --year 2026 \
            --output ../back-end/data/rankings/walterfootball_2026.json

      - name: Merge rankings
        working-directory: scrapers
        run: |
          bun run src/cli.ts rankings \
            --merge \
            --year 2026 \
            --output ../back-end/data/rankings/rankings_2026.json

      - name: Validate JSON output
        run: |
          for f in back-end/data/rankings/tankathon_2026.json back-end/data/rankings/walterfootball_2026.json back-end/data/rankings/rankings_2026.json; do
            if [ -f "$f" ]; then
              if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
                echo "ERROR: $f is not valid JSON" >&2
                exit 1
              fi
              echo "Validated: $f"
            fi
          done

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update prospect rankings data (${{ github.run_id }})"
          title: "Update prospect rankings data"
          body: |
            Automated daily prospect rankings scrape from Tankathon and WalterFootball.

            🤖 Generated by the Scrape Prospect Rankings workflow.
          branch: auto/prospect-rankings-update
          delete-branch: true
          labels: automated,data-update
          add-paths: |
            back-end/data/rankings/tankathon_2026.json
            back-end/data/rankings/walterfootball_2026.json
            back-end/data/rankings/rankings_2026.json

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: squash
