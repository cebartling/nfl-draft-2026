name: Scrape Combine Results

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scraper-combine-results
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            back-end/target
          key: ${{ runner.os }}-cargo-combine-scraper-${{ hashFiles('back-end/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-combine-scraper-

      - name: Build scraper
        working-directory: back-end
        run: cargo build --release -p combine-data-scraper

      - name: Scrape PFR
        working-directory: back-end
        continue-on-error: true
        run: |
          ./target/release/combine-data-scraper scrape \
            --source pfr \
            --year 2026 \
            --output data/combine_pfr_2026.json

      - name: Scrape Mockdraftable
        working-directory: back-end
        continue-on-error: true
        run: |
          ./target/release/combine-data-scraper scrape \
            --source mockdraftable \
            --year 2026 \
            --output data/combine_mockdraftable_2026.json

      - name: Merge combine data
        working-directory: back-end
        run: |
          PFR=data/combine_pfr_2026.json
          MD=data/combine_mockdraftable_2026.json
          if [ -f "$PFR" ] && [ -f "$MD" ]; then
            ./target/release/combine-data-scraper scrape \
              --merge \
              --year 2026 \
              --output data/combine_2026.json
          elif [ -f "$PFR" ]; then
            echo "Only PFR source available; copying as output."
            cp "$PFR" data/combine_2026.json
          elif [ -f "$MD" ]; then
            echo "Only Mockdraftable source available; copying as output."
            cp "$MD" data/combine_2026.json
          else
            echo "ERROR: Both scrapers failed; no combine data produced." >&2
            exit 1
          fi

      - name: Validate JSON output
        working-directory: back-end
        run: |
          for f in data/combine_pfr_2026.json data/combine_mockdraftable_2026.json data/combine_2026.json; do
            if [ -f "$f" ]; then
              if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
                echo "ERROR: $f is not valid JSON" >&2
                exit 1
              fi
              echo "Validated: $f"
            fi
          done

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update combine results data (${{ github.run_id }})"
          title: "Update combine results data"
          body: |
            Automated NFL Combine results scrape from Pro Football Reference and Mockdraftable.

            🤖 Generated by the Scrape Combine Results workflow.
          branch: auto/combine-results-update
          delete-branch: true
          labels: automated,data-update
          add-paths: |
            back-end/data/combine_pfr_2026.json
            back-end/data/combine_mockdraftable_2026.json
            back-end/data/combine_2026.json

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: squash
