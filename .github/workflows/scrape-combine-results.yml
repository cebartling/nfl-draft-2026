name: Scrape Combine Results

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scraper-combine-results
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: scrapers
        run: bun install

      - name: Install Playwright browsers
        run: cd scrapers && bunx playwright install chromium --with-deps

      - name: Scrape and merge combine data
        working-directory: scrapers
        run: |
          bun run src/cli.ts combine \
            --merge \
            --year 2026 \
            --output ../back-end/data/combine_2026.json

      - name: Validate JSON output
        run: |
          for f in back-end/data/combine_2026.json; do
            if [ -f "$f" ]; then
              if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
                echo "ERROR: $f is not valid JSON" >&2
                exit 1
              fi
              echo "Validated: $f"
            fi
          done

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update combine results data (${{ github.run_id }})"
          title: "Update combine results data"
          body: |
            Automated NFL Combine results scrape from Pro Football Reference and Mockdraftable.

            🤖 Generated by the Scrape Combine Results workflow.
          branch: auto/combine-results-update
          delete-branch: true
          labels: automated,data-update
          add-paths: |
            back-end/data/combine_2026.json

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: squash
