name: Scrape Draft Order

on:
  schedule:
    # Daily at 06:00 UTC (midnight CT)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scraper-draft-order
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: scrapers
        run: bun install

      - name: Install Playwright browsers
        working-directory: scrapers
        run: bunx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scrapers
        run: |
          bun run src/cli.ts draft-order \
            --year 2026 \
            --output ../back-end/data/draft_order_2026.json

      - name: Validate JSON output
        run: |
          if ! python3 -m json.tool back-end/data/draft_order_2026.json > /dev/null 2>&1; then
            echo "ERROR: draft_order_2026.json is not valid JSON" >&2
            exit 1
          fi
          echo "Validated: back-end/data/draft_order_2026.json"

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update draft order data (${{ github.run_id }})"
          title: "Update draft order data"
          body: |
            Automated daily draft order scrape from Tankathon.

            🤖 Generated by the Scrape Draft Order workflow.
          branch: auto/draft-order-update
          delete-branch: true
          labels: automated,data-update
          add-paths: back-end/data/draft_order_2026.json

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: squash
