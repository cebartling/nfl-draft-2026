name: Scrape Draft Order

on:
  schedule:
    # Daily at 06:00 UTC (midnight CT)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scraper-draft-order
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            back-end/target
          key: ${{ runner.os }}-cargo-scraper-${{ hashFiles('back-end/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-scraper-

      - name: Build scraper
        working-directory: back-end
        run: cargo build --release -p draft-order-scraper

      - name: Run scraper
        working-directory: back-end
        run: |
          ./target/release/draft-order-scraper \
            --year 2026 \
            --output data/draft_order_2026.json

      - name: Validate JSON output
        working-directory: back-end
        run: |
          if ! python3 -m json.tool data/draft_order_2026.json > /dev/null 2>&1; then
            echo "ERROR: data/draft_order_2026.json is not valid JSON" >&2
            exit 1
          fi
          echo "Validated: data/draft_order_2026.json"

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update draft order data (${{ github.run_id }})"
          title: "Update draft order data"
          body: |
            Automated daily draft order scrape from Tankathon.

            🤖 Generated by the Scrape Draft Order workflow.
          branch: auto/draft-order-update
          delete-branch: true
          labels: automated,data-update
          add-paths: back-end/data/draft_order_2026.json

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: squash
